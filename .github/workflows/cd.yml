name: CD

on:
  push:
    branches: ["main"]

concurrency:
  group: cd-main
  cancel-in-progress: true

jobs:
  ci:
    name: TypeScript build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc)
        run: npm run build

  verify-deploy:
    name: Verify production deploy
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Wait for Railway deploy
        run: sleep 120

      - name: Smoke test production API
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
        run: |
          if [ -z "$PRODUCTION_URL" ]; then
            echo "PRODUCTION_URL not set, skipping verification"
            exit 0
          fi
          url="${PRODUCTION_URL}/jobs"
          status=$(curl -fsS -o /dev/null -w "%{http_code}" "$url" || echo "000")
          if [ "$status" = "200" ]; then
            echo "Production API responded with 200 OK"
          else
            echo "Production API returned HTTP $status (expected 200)"
            exit 1
          fi
